name: VTOP Monitor

on:
  schedule:
    # Run every 6 hours (at 00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps chromium
    
    - name: Create .env file from secrets
      run: |
        echo "VTOP_USERNAME=${{ secrets.VTOP_USERNAME }}" >> .env
        echo "VTOP_PASSWORD=${{ secrets.VTOP_PASSWORD }}" >> .env
        echo "VTOP_SEMESTER_ID=${{ secrets.VTOP_SEMESTER_ID }}" >> .env
        echo "CHECK_INTERVAL_HOURS=6" >> .env
        echo "GMAIL_ENABLED=true" >> .env
        echo "GMAIL_EMAIL=${{ secrets.GMAIL_EMAIL }}" >> .env
        echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> .env
        echo "GMAIL_TO_EMAIL=${{ secrets.GMAIL_TO_EMAIL }}" >> .env
    
    - name: Download last state artifact
      uses: actions/download-artifact@v4
      with:
        name: last-state
        path: .
      continue-on-error: true
    
    - name: Run single check
      run: python main.py
    
    - name: Upload last state artifact
      uses: actions/upload-artifact@v4
      with:
        name: last-state
        path: |
          last_state.json
          data/*.json
        retention-days: 90
